<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>FLEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --surface: #111; --border: #1e1e1e;
  --ingresso: #f5a623; --buono: #50e3c2; --neg: #e35050;
  --orario: #f5a623; --pos: #4caf50; --personale: #9c27b0; --dim: #888;
  --mono: 'Share Tech Mono', monospace; --title: 'Bebas Neue', sans-serif;
}
html, body { background: var(--bg); color: #fff; font-family: var(--mono); -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
body { display: flex; flex-direction: column; align-items: center; height: 100dvh; overflow: hidden; }

/* BANNER con FLEX sovrapposto */
.banner {
  width: 100%;
  max-width: 480px;
  height: 120px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.banner img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 25%;
  display: block;
}
.banner::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(10,10,10,0.15) 0%, rgba(10,10,10,0.55) 100%);
}
.banner-title {
  position: absolute; bottom: 8px; left: 0; right: 0;
  text-align: center;
  font-family: var(--title);
  font-size: 2.2rem;
  letter-spacing: .35em;
  color: #fff;
  z-index: 2;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

/* Orologio */
.live-clock { width: 100%; text-align: center; font-size: .7rem; color: var(--dim); padding: 5px 0 3px; letter-spacing: .15em; flex-shrink: 0; }

/* Scroll area per le card */
.cards-area {
  width: 100%;
  max-width: 480px;
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 8px;
  gap: 6px;
}

.card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 8px 16px 7px; display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
.card-label { font-size: .6rem; letter-spacing: .25em; text-transform: uppercase; }
.card-time { font-size: 2.6rem; line-height: 1; letter-spacing: .04em; }

.card-input { flex-direction: row; justify-content: space-between; align-items: center; padding: 8px 10px; }
.card-input .center { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }

.btn-adj { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--ingresso); background: transparent; color: var(--ingresso); font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.btn-adj:active { background: rgba(245,166,35,.15); }

.sep { width: 100%; height: 1px; background: var(--border); flex-shrink: 0; }

.c-ingresso { color: var(--ingresso); }
.c-buono    { color: var(--buono); }
.c-neg      { color: var(--neg); }
.c-orario   { color: var(--orario); }
.c-pos      { color: var(--pos); }
.c-personale{ color: var(--personale); }

.progress-wrap { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--neg), var(--orario), var(--pos)); border-radius: 2px; transition: width 1s linear; width: 0%; }

.status-badge { width: 100%; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; font-size: .65rem; letter-spacing: .1em; text-align: center; color: var(--dim); display: flex; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0; }
.status-badge .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.card-personale { border-color: rgba(156,39,176,.3); display: none; }
.card-personale.visible { display: flex; }
.card-note { font-size: .55rem; color: var(--dim); letter-spacing: .1em; text-align: center; line-height: 1.4; }

.btn-now { width: 100%; padding: 8px; border: 1px solid var(--border); background: transparent; color: var(--dim); font-family: var(--mono); font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; border-radius: 2px; cursor: pointer; flex-shrink: 0; }
.btn-now:active { background: var(--surface); color: #fff; border-color: #555; }

@keyframes pulse-glow { 0%,100%{opacity:1} 50%{opacity:.55} }
.next-milestone .card-time { animation: pulse-glow 2s ease-in-out infinite; }

.time-picker-wrap { position: relative; cursor: pointer; }
.time-picker-wrap input[type="time"] { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; font-size: 16px; }
</style>
</head>
<body>

<!-- Banner con titolo sovrapposto -->
<div class="banner">
  <img src="banner.jpg" alt="">
  <span class="banner-title">FLEX</span>
</div>

<div class="live-clock" id="liveClock">--:--:--</div>

<div class="cards-area">

  <div class="card card-input">
    <button class="btn-adj" id="btnMinus">&#8722;</button>
    <div class="center">
      <span class="card-label c-ingresso">INGRESSO</span>
      <div class="time-picker-wrap">
        <span class="card-time c-ingresso" id="dispIngresso">--:--</span>
        <input type="time" id="timePicker">
      </div>
    </div>
    <button class="btn-adj" id="btnPlus">&#43;</button>
  </div>

  <div class="sep"></div>

  <div class="card" id="cardBuono">
    <span class="card-label c-buono">Buono pasto</span>
    <span class="card-time c-buono" id="dispBuono">--:--</span>
  </div>

  <div class="card" id="cardNeg">
    <span class="card-label c-neg">flex NEG</span>
    <span class="card-time c-neg" id="dispNeg">--:--</span>
  </div>

  <div class="card" id="cardOrario">
    <span class="card-label c-orario">ORARIO</span>
    <span class="card-time c-orario" id="dispOrario">--:--</span>
  </div>

  <div class="card" id="cardPos">
    <span class="card-label c-pos">flex POS</span>
    <span class="card-time c-pos" id="dispPos">--:--</span>
  </div>

  <div class="card card-personale" id="cardPersonale">
    <span class="card-label c-personale">presenza per motivi personali</span>
    <span class="card-time c-personale" id="dispPersonale">0:00</span>
    <span class="card-note" id="notePersonale"></span>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status-badge">
    <span class="dot" id="statusDot" style="background:#444"></span>
    <span id="statusText">imposta l'orario di ingresso</span>
  </div>

  <button class="btn-now" id="btnNow">USA ORA ATTUALE</button>

</div>

<script>
var INIZIO = 7*60+30, FINE = 18*60+30;
var BUONO = 6*60+31, NEG = 7*60+12, STD = 7*60+42, POS = 8*60+12;
var ingressoMin = null;

var elIngresso  = document.getElementById('dispIngresso');
var elBuono     = document.getElementById('dispBuono');
var elNeg       = document.getElementById('dispNeg');
var elOrario    = document.getElementById('dispOrario');
var elPos       = document.getElementById('dispPos');
var elPersonale = document.getElementById('dispPersonale');
var elNote      = document.getElementById('notePersonale');
var cardPers    = document.getElementById('cardPersonale');
var picker      = document.getElementById('timePicker');
var bar         = document.getElementById('progressBar');
var sTxt        = document.getElementById('statusText');
var sDot        = document.getElementById('statusDot');
var clock       = document.getElementById('liveClock');
var cardMap = {
  buono:  document.getElementById('cardBuono'),
  neg:    document.getElementById('cardNeg'),
  orario: document.getElementById('cardOrario'),
  pos:    document.getElementById('cardPos')
};

function fmt(m) {
  var t=((m%1440)+1440)%1440;
  return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
}
function dur(m) { return Math.floor(m/60)+':'+String(m%60).padStart(2,'0'); }
function nowM() { var d=new Date(); return d.getHours()*60+d.getMinutes(); }
function nowS() { var d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0'); }

function render() {
  if (ingressoMin===null) return;
  var now=nowM();
  var start=Math.max(ingressoMin,INIZIO);
  var mpAnticipo=ingressoMin<INIZIO?INIZIO-ingressoMin:0;
  var buono=start+BUONO, neg=start+NEG, orario=start+STD, pos=Math.min(start+POS,FINE);

  elIngresso.textContent=fmt(ingressoMin);
  elBuono.textContent=fmt(buono);
  elNeg.textContent=fmt(neg);
  elOrario.textContent=fmt(orario);
  elPos.textContent=fmt(pos);
  picker.value=fmt(ingressoMin);

  bar.style.width=Math.min(100,Math.max(0,(now-start)/STD*100))+'%';

  var mpTardivi=now>FINE?now-FINE:0;
  var mpTot=mpAnticipo+mpTardivi;
  if (mpTot>0) {
    cardPers.classList.add('visible');
    elPersonale.textContent=dur(mpTot);
    var nota=[];
    if (mpAnticipo>0) nota.push('anticipato '+dur(mpAnticipo)+' prima delle 07:30');
    if (mpTardivi>0)  nota.push('oltre le 18:30 da '+dur(mpTardivi));
    elNote.textContent=nota.join(' \u00b7 ');
  } else {
    cardPers.classList.remove('visible');
  }

  Object.values(cardMap).forEach(function(c){ c.classList.remove('next-milestone'); });
  var col,msg,next;
  if (now>=FINE) {
    col='#9c27b0'; msg='finestra oraria chiusa (18:30)'; next=null;
  } else if (now<buono) {
    col='#888'; msg='buono pasto tra '+(buono-now)+'min'; next=cardMap.buono;
  } else if (now<neg) {
    col='#e35050'; msg='flex NEG tra '+(neg-now)+'min'; next=cardMap.neg;
  } else if (now<orario) {
    col='#f5a623'; msg='orario standard tra '+(orario-now)+'min'; next=cardMap.orario;
  } else if (now<pos) {
    col='#4caf50'; msg='flex POS tra '+(pos-now)+'min'; next=cardMap.pos;
  } else {
    col='#4caf50';
    var ex=now-orario,hh=Math.floor(ex/60),mm=ex%60;
    msg=(hh>0?'+'+hh+'h'+String(mm).padStart(2,'0')+'m':'+'+mm+'min')+' \u2014 flessibilit\u00e0 positiva totale';
    next=null;
  }
  if (next) next.classList.add('next-milestone');
  sDot.style.background=col;
  sTxt.textContent=msg;
}

function tick(){ clock.textContent=nowS(); render(); }
setInterval(tick,1000); tick();

function setNow(){ ingressoMin=nowM(); render(); }
document.getElementById('btnNow').addEventListener('click',setNow);
document.getElementById('btnMinus').addEventListener('click',function(){ if(ingressoMin===null)setNow(); ingressoMin--; render(); });
document.getElementById('btnPlus').addEventListener('click',function(){ if(ingressoMin===null)setNow(); ingressoMin++; render(); });

var iv=null;
function sp(d){ if(ingressoMin===null)setNow(); ingressoMin+=d; render(); iv=setInterval(function(){ ingressoMin+=d; render(); },120); }
function ep(){ clearInterval(iv); }
var bm=document.getElementById('btnMinus'),bp=document.getElementById('btnPlus');
bm.addEventListener('mousedown',function(){ sp(-1); });
bm.addEventListener('touchstart',function(e){ e.preventDefault(); sp(-1); },{passive:false});
bp.addEventListener('mousedown',function(){ sp(1); });
bp.addEventListener('touchstart',function(e){ e.preventDefault(); sp(1); },{passive:false});
['mouseup','mouseleave','touchend','touchcancel'].forEach(function(ev){ bm.addEventListener(ev,ep); bp.addEventListener(ev,ep); });

picker.addEventListener('change',function(){
  if(!picker.value) return;
  var p=picker.value.split(':');
  ingressoMin=parseInt(p[0])*60+parseInt(p[1]);
  render();
});

if(new Date().getHours()>=7&&new Date().getHours()<10) setNow();
</script>
</body>
</html>
